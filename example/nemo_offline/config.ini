[pdaf]
  # PDAF screen/log verbosity. Lower values print more; higher values reduce
  # routine output. Typical values are 0-3 during debugging and 3 for normal
  # offline runs.
  screen = 2
  # Ensemble size. This must match the number of ensemble directories available
  # under [io].path_rst_root, for example ens_1 ... ens_N when ens_prefix=ens_.
  dim_ens = 2

[filter_options]
# PDAF filter algorithm. Common choices:
#   1=SEIK, 2=EnKF, 3=LSEIK, 4=ETKF, 5=LETKF, 6=ESTKF, 7=LESTKF,
#   8=LEnKF, 9=NETF, 10=LNETF, 11=LKNETF, 12=PF, 100=GENOBS,
#   200=3DVar, 0=SEEK.
# Local filters such as LETKF/LESTKF use local.py and observation localisation.
filtertype = 7
# Filter variant passed directly to PDAF. Valid values depend on filtertype;
# use 0 for the PDAF default subtype unless a PDAF filter option requires more.
subtype = 0
# Forgetting-factor mode:
#   0=fixed value from forget, 1=global adaptive, 2=local adaptive for
#   local SEIK/ETKF/STKF-style filters where supported by PDAF.
type_forget = 0
# Covariance inflation/forgetting factor. Values below 1.0 inflate ensemble
# spread in PDAF's convention; 1.0 means no fixed forgetting.
forget = 0.8

[model]
# Number of sea-ice categories. It is only used when sea-ice category fields
# are part of the state vector. For ocean-only examples it can remain 0 or any
# harmless placeholder; this sample keeps the NEMO sea-ice default of 5.
numcat = 5

[io]
# NetCDF/log IO verbosity hook. Currently kept for compatibility with the
# original NEMO-PDAF namelist style; Python logging is controlled mainly by
# [pdaf].screen.
verbose_io = 2
# Directory containing the NEMO domain configuration file.
path_dom = .
# NEMO domain file. It must contain grid variables such as glamt/gphit and
# top_level/bottom_level, used to build the wet-point state vector.
fname_dom = ORCA_R2_zps_domcfg.nc
# Restart file path is constructed as:
#   path_rst_root/ens_prefix[1-N]/path_rst_suffix/f_basename_rst_000x.nc
# where 000x is the MPI/filter rank written with four digits.
path_rst_root = .
# Ensemble member directory prefix. Member numbers must be 1..N without zero
# padding, for example ens_1 and ens_2 rather than ens_001.
ens_prefix = ens_
# Optional subdirectory between each ensemble directory and the restart files.
# Leave empty when files live directly under ens_1, ens_2, ...
path_rst_suffix =
# Basename of the NEMO restart files, before the rank suffix _0000.nc.
f_basename_rst = ORCA2_00000072_restart
# Output path for NEMO ASM files. Files are written as:
#   path_asm_root/ens_prefix[1-N]/assim_background_increments_xxxx.nc
#   path_asm_root/ens_prefix[1-N]/assim_background_state_DI_xxxx.nc
path_asm_root = .
# Optional NetCDF compression for generated ASM files. false is fastest; true
# reduces file size using zlib compression level 1.
do_deflate = false

[statevector]
# Comma-separated list of state-field sections to include in the PDAF state.
# Add another variable by creating a matching section below and listing it here,
# for example: svnames = temperature, salinity
svnames = temperature

[temperature]
# Number of physical dimensions represented in the state vector:
#   2=surface/horizontal wet points, 3=all wet water-column points.
ndims = 2
# Human-readable field name used in logs and output attributes.
variable = temperature
# Variable name written to NEMO ASM increment files.
name_incr = bckint
# Variable name read from NEMO restart files.
name_rest_n = tn
# Variable name written to NEMO ASM direct-initialisation background files.
name_bkg_din = tn
# Optional restart-file basename override retained in the field metadata. The
# current Reader uses [io].f_basename_rst for all fields.
rst_file = ORCA2_00000072_restart
# Unit string written to output variable attributes.
unit = m
# Optional transform before analysis:
#   0=none, 1=log10(value + trafo_shift), 2=ln(value + trafo_shift).
transform = 0
# Shift added before log transforms and subtracted when transforms are reversed.
trafo_shift = 0.0
# Optional clipping mode:
#   0=no clipping, 1=min_limit only, 2=max_limit only, 3=min and max.
limit = 0
# Minimum value used when limit is 1 or 3.
min_limit = 0.0
# Maximum value used when limit is 2 or 3.
max_limit = 0.0
# Advanced sea-ice/category hooks for fields with a category dimension:
#   k_name=lev uses normal vertical levels; k_name=cat marks category data.
#   operation=sum_over_cat_ice or select_cat_ice controls category handling.
#   ice_cat selects the 1-based category when operation=select_cat_ice.
k_name = lev
operation =
ice_cat = 0

[observations]
# Comma-separated list of observation sections. The current factory implements
# sst; add new names here after adding a corresponding observation class.
obsnames = sst

[sst]
# Assimilation switch for this observation type: 1=use, 0=register but skip.
doassim = 1
# State-field section observed by this observation type. For synthetic SST in
# this example, observations are generated from the surface temperature field.
field_name = temperature
# Observation-domain mode retained for compatibility with NEMO-PDAF namelists.
# The current Python SST path uses PDAF-OMI global gathering and local selection.
use_global_obs = 1
# Local analysis cut-off radius in metres/radians according to PDAF-OMI's
# great-circle distance configuration. Observations outside this radius are
# excluded from a local analysis domain.
cradius = 20000
# Support radius for localisation weights. For loc_weight=2 this is the compact
# support of the fifth-order polynomial; for loc_weight=1 it is the 1/e radius.
sradius = 20000
# Localisation weighting:
#   0=constant, 1=exponential, 2=fifth-order polynomial,
#   3/4=regulated R-localisation variants supported by PDAF.
loc_weight = 2
# Synthetic observation standard deviation. The current SST class creates fake
# observations by adding normal noise with this amplitude to the ensemble mean.
noise_amp = 0.5
# Optional path for future real-observation readers. The current SST example
# does not read this file yet.
obs_path =
