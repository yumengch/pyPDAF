{% set version = "1.1" %}
{% set openmp = openmp|default(false) %}
{% set python_freethreading = python_freethreading|default(false) %}

package:
  name: pypdaf
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  string: py{{ CONDA_PY }}{% if python_freethreading %}t{% endif %}{% if openmp %}_openmp{% endif %}_{{ PKG_BUILDNUM }}
{% if python_freethreading %}
  skip: true  # [py<313]
{% endif %}

requirements:
  host:
    - python
{% if python_freethreading %}
    - python-freethreading
{% endif %}
    - meson-python {{ pymeson }}
    - numpy {{numpy_version}}
    - mpi=*={{ mpi }}
    - mpi4py
    - blas=*=openblas
{% if openmp %}
    - libgomp      # [linux]
    - llvm-openmp-fortran  # [osx]
    - llvm-openmp-fortran  # [win]
{% endif %}
    - flang-rt_win-64 # [win]
    - libflang # [win]
  build:
    - python
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
    - vs2022_win-64     # [win]
    - numpy {{numpy_version}}
    - cython
  run:
    - flang-rt_win-64 # [win]
    - python
{% if python_freethreading %}
    - python-freethreading
{% endif %}
    - numpy
    - mpi=*={{ mpi }}
    - mpi4py
    - blas=*=openblas
{% if openmp %}
    - libgomp      # [linux]
    - llvm-openmp-fortran  # [osx]
    - llvm-openmp-fortran  # [win]
{% endif %}

pin_run_as_build:
    mpi: x.x
    mpi4py: x.x
    blas: x.x

about:
  home: https://github.com/yumengch/pyPDAF
  summary: A Python interface to PDAF
  description: pyPDAF is a python interface to the Fortran-based PDAF library
  license: GPL
  doc_url: https://yumengch.github.io/pyPDAF/index.html
  dev_url: https://github.com/yumengch/pyPDAF
